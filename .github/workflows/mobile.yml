name: Mobile

on:
  push:
    branches: [main, 'claude/**']
    paths: ['mobile/**']
  pull_request:
    paths: ['mobile/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]
      platform:
        description: 'Plateforme cible'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  # ── 1. Vérification TypeScript ───────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification des types
        run: npm run typecheck

  # ── 2. EAS Update — OTA automatique à chaque push ───────────────────────────
  eas-update:
    name: EAS Update (OTA · canal preview)
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true   # Non-bloquant tant qu'aucun build preview n'est installé
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer ou créer le Project ID EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROJECT_ID=$(python3 << 'PYEOF'
          import urllib.request, json, os, sys

          token = os.environ['EXPO_TOKEN']
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          def gql(query):
              data = json.dumps({'query': query}).encode()
              req = urllib.request.Request('https://api.expo.dev/graphql', data=data, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      resp = json.loads(r.read())
                      print(f'[graphql] {resp}', file=sys.stderr)
                      return resp
              except Exception as e:
                  print(f'[graphql error] {e}', file=sys.stderr)
                  return {}

          # 1. Chercher le projet existant
          r = gql('{ app { byFullName(fullName: "@tahauser/dispatch-taxi-mobile") { id } } }')
          b = ((r.get('data') or {}).get('app') or {}).get('byFullName')
          if b:
              print(b['id'])
              sys.exit(0)

          # 2. Récupérer l'accountId de tahauser
          r = gql('{ account { byName(accountName: "tahauser") { id } } }')
          acct = ((r.get('data') or {}).get('account') or {}).get('byName')
          if not acct:
              print('[error] compte tahauser introuvable', file=sys.stderr)
              sys.exit(1)

          account_id = acct['id']
          print(f'[info] accountId={account_id}', file=sys.stderr)

          # 3. Créer le projet
          mutation = f'mutation {{ app {{ createApp(appInput: {{ accountId: "{account_id}", projectName: "dispatch-taxi-mobile" }}) {{ id }} }} }}'
          r = gql(mutation)
          c = ((r.get('data') or {}).get('app') or {}).get('createApp')
          if c:
              print(c['id'])
          else:
              print('[error] création échouée', file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Impossible de récupérer ou créer le Project ID EAS"
            exit 1
          fi
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "✅ Project ID: $PROJECT_ID"

      - name: Publier la mise à jour OTA
        working-directory: mobile
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive

  # ── 3. EAS Build — déclenché manuellement via workflow_dispatch ──────────────
  eas-build:
    name: EAS Build · ${{ inputs.profile }} · ${{ inputs.platform }}
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer ou créer le Project ID EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROJECT_ID=$(python3 << 'PYEOF'
          import urllib.request, json, os, sys

          token = os.environ['EXPO_TOKEN']
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          def gql(query):
              data = json.dumps({'query': query}).encode()
              req = urllib.request.Request('https://api.expo.dev/graphql', data=data, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      resp = json.loads(r.read())
                      print(f'[graphql] {resp}', file=sys.stderr)
                      return resp
              except Exception as e:
                  print(f'[graphql error] {e}', file=sys.stderr)
                  return {}

          # 1. Chercher le projet existant
          r = gql('{ app { byFullName(fullName: "@tahauser/dispatch-taxi-mobile") { id } } }')
          b = ((r.get('data') or {}).get('app') or {}).get('byFullName')
          if b:
              print(b['id'])
              sys.exit(0)

          # 2. Récupérer l'accountId de tahauser
          r = gql('{ account { byName(accountName: "tahauser") { id } } }')
          acct = ((r.get('data') or {}).get('account') or {}).get('byName')
          if not acct:
              print('[error] compte tahauser introuvable', file=sys.stderr)
              sys.exit(1)

          account_id = acct['id']
          print(f'[info] accountId={account_id}', file=sys.stderr)

          # 3. Créer le projet
          mutation = f'mutation {{ app {{ createApp(appInput: {{ accountId: "{account_id}", projectName: "dispatch-taxi-mobile" }}) {{ id }} }} }}'
          r = gql(mutation)
          c = ((r.get('data') or {}).get('app') or {}).get('createApp')
          if c:
              print(c['id'])
          else:
              print('[error] création échouée', file=sys.stderr)
              sys.exit(1)
          PYEOF
          )
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Impossible de récupérer ou créer le Project ID EAS"
            exit 1
          fi
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "✅ Project ID: $PROJECT_ID"

      - name: EAS Build
        working-directory: mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
