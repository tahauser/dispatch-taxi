name: Mobile

on:
  push:
    branches: [main, 'claude/**']
    paths: ['mobile/**']
  pull_request:
    paths: ['mobile/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]
      platform:
        description: 'Plateforme cible'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  # ── 1. Vérification TypeScript ───────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification des types
        run: npm run typecheck

  # ── 2. EAS Update — OTA automatique à chaque push ───────────────────────────
  eas-update:
    name: EAS Update (OTA · canal preview)
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true   # Non-bloquant tant qu'aucun build preview n'est installé
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer ou créer le Project ID EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Recherche du projet @tahauser/dispatch-taxi-mobile..."
          QUERY_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ app { byFullName(fullName: \"@tahauser/dispatch-taxi-mobile\") { id } } }"}' \
            https://api.expo.dev/graphql)
          echo "Query: $QUERY_RESPONSE"
          PROJECT_ID=$(echo "$QUERY_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); b=((d.get('data') or {}).get('app') or {}).get('byFullName'); print(b['id'] if b else '')" \
            2>/dev/null || true)
          if [ -z "$PROJECT_ID" ]; then
            echo "Projet introuvable, création..."
            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { createApp(appInput: { accountName: \"tahauser\", projectName: \"dispatch-taxi-mobile\", privacyPolicy: PUBLIC }) { id } }"}' \
              https://api.expo.dev/graphql)
            echo "Create: $CREATE_RESPONSE"
            PROJECT_ID=$(echo "$CREATE_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); c=(d.get('data') or {}).get('createApp'); print(c['id'] if c else '')" \
              2>/dev/null || true)
          fi
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Impossible de récupérer ou créer le Project ID EAS"
            exit 1
          fi
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "✅ Project ID: $PROJECT_ID"

      - name: Publier la mise à jour OTA
        working-directory: mobile
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive

  # ── 3. EAS Build — déclenché manuellement via workflow_dispatch ──────────────
  eas-build:
    name: EAS Build · ${{ inputs.profile }} · ${{ inputs.platform }}
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer ou créer le Project ID EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Recherche du projet @tahauser/dispatch-taxi-mobile..."
          QUERY_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ app { byFullName(fullName: \"@tahauser/dispatch-taxi-mobile\") { id } } }"}' \
            https://api.expo.dev/graphql)
          echo "Query: $QUERY_RESPONSE"
          PROJECT_ID=$(echo "$QUERY_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); b=((d.get('data') or {}).get('app') or {}).get('byFullName'); print(b['id'] if b else '')" \
            2>/dev/null || true)
          if [ -z "$PROJECT_ID" ]; then
            echo "Projet introuvable, création..."
            CREATE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { createApp(appInput: { accountName: \"tahauser\", projectName: \"dispatch-taxi-mobile\", privacyPolicy: PUBLIC }) { id } }"}' \
              https://api.expo.dev/graphql)
            echo "Create: $CREATE_RESPONSE"
            PROJECT_ID=$(echo "$CREATE_RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); c=(d.get('data') or {}).get('createApp'); print(c['id'] if c else '')" \
              2>/dev/null || true)
          fi
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Impossible de récupérer ou créer le Project ID EAS"
            exit 1
          fi
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "✅ Project ID: $PROJECT_ID"

      - name: EAS Build
        working-directory: mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
