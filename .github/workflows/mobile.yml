name: Mobile

on:
  push:
    branches: [main, 'claude/**']
    paths: ['mobile/**']
  pull_request:
    paths: ['mobile/**']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]
      platform:
        description: 'Plateforme cible'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  # ── 1. Vérification TypeScript ───────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification des types
        run: npm run typecheck

  # ── 2. EAS Update — OTA automatique à chaque push ───────────────────────────
  eas-update:
    name: EAS Update (OTA · canal preview)
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    continue-on-error: true   # Non-bloquant tant qu'aucun build preview n'est installé
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer le Project ID Expo
        run: |
          PROJECT_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" \
            "https://api.expo.dev/v2/projects?slug=dispatch-taxi-mobile&ownerUsername=tahauser" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Publier la mise à jour OTA
        working-directory: mobile
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive

  # ── 3. EAS Build — déclenché manuellement via workflow_dispatch ──────────────
  eas-build:
    name: EAS Build · ${{ inputs.profile }} · ${{ inputs.platform }}
    needs: typecheck
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        working-directory: mobile
        run: npm ci

      - name: Récupérer le Project ID Expo
        run: |
          PROJECT_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" \
            "https://api.expo.dev/v2/projects?slug=dispatch-taxi-mobile&ownerUsername=tahauser" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
          echo "EXPO_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: EAS Build
        working-directory: mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
