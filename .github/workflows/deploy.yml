name: Deploy to betashop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le fingerprint de la VM
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 40.85.221.73 >> ~/.ssh/known_hosts

      - name: Deploy sur la VM Azure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 40.85.221.73
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          debug: true
          script: /home/azureuser/deploy.sh
